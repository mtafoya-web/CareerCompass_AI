<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Mentor</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:#e5e7eb;
}

.layout{
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:#111827;
padding:30px 20px;
border-right:1px solid #1f2937;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
color:white;
}

.nav{
display:flex;
flex-direction:column;
gap:12px;
}

.nav a{
text-decoration:none;
color:#cbd5e1;
padding:12px 14px;
border-radius:10px;
transition:0.2s;
}

.nav a:hover,
.nav a.active{
background:#1e293b;
color:white;
}

.main{
flex:1;
display:flex;
flex-direction:column;
padding:30px;
}

.chat-wrapper{
display:flex;
flex-direction:column;
height:100%;
max-width:900px;
margin:auto;
background:#1e293b;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.chat-header{
padding:20px;
border-bottom:1px solid #334155;
}

.chat-header h2{
margin:0;
color:white;
}

.chat-header p{
margin:5px 0 0;
color:#94a3b8;
font-size:14px;
}

.chat-messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.message{
display:flex;
}

.message.user{
justify-content:flex-end;
}

.bubble{
max-width:70%;
padding:12px 16px;
border-radius:14px;
font-size:14px;
line-height:1.4;
}

.message.user .bubble{
background:#2563eb;
color:white;
}

.message.assistant .bubble{
background:#334155;
color:#e5e7eb;
}

.chat-input-form{
display:flex;
border-top:1px solid #334155;
padding:15px;
gap:10px;
}

.chat-input-form input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #334155;
background:#0f172a;
color:white;
}

.chat-input-form input:focus{
outline:none;
border-color:#3b82f6;
}

.chat-input-form button{
background:#2563eb;
border:none;
color:white;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
}

.chat-input-form button:hover{
background:#1d4ed8;
}

</style>
</head>

<body>

<div class="layout">

<aside class="sidebar">
<div class="logo">CareerCompass</div>

<nav class="nav">
<a href="{% url 'student_profile' %}">Profile</a>
<a href="#">Dashboard</a>
<a href="#">Recommendations</a>
<a href="#">Events</a>
<a href="#">Internships</a>
<a href="#">Projects</a>
<a href="{% url 'chat_mentor' %}" class="active">Chat Mentor</a>
</nav>

</aside>

<main class="main">

<div class="chat-wrapper">

<div class="chat-header">
<h2>AI Mentor</h2>
<p>Your career guide</p>
</div>

<div class="chat-messages">

{% for message in messages %}

<div class="message {% if message.sender == 'user' %}user{% else %}assistant{% endif %}">
<div class="bubble">{{ message.content }}</div>
</div>

{% endfor %}

</div>

<form method="post" class="chat-input-form">
{% csrf_token %}
<input type="text" name="message" placeholder="Type your message..." required>
<button type="submit">Send</button>
</form>

</div>

</main>

</div>

</body>
</html>
