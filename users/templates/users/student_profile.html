<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: #111827;
            padding: 30px 20px;
            border-right: 1px solid #1f2937;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #f8fafc;
            margin-bottom: 30px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav a {
            text-decoration: none;
            color: #cbd5e1;
            padding: 12px 14px;
            border-radius: 10px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .nav a:hover,
        .nav a.active {
            background: #1e293b;
            color: #ffffff;
        }

        .main {
            flex: 1;
            padding: 40px;
            background: #0f172a;
        }

        .topbar {
            margin-bottom: 30px;
        }

        .topbar h1 {
            margin: 0 0 8px 0;
            color: #f8fafc;
            font-size: 30px;
        }

        .topbar p {
            margin: 0;
            color: #94a3b8;
        }

        .content-card {
            max-width: 850px;
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        form p {
            margin-bottom: 18px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e5e7eb;
            font-size: 14px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        textarea {
            resize: vertical;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        .helptext {
            display: block;
            margin-top: 4px;
            font-size: 12px;
            color: #94a3b8;
        }

        ul.errorlist {
            color: #f87171;
            margin: 5px 0;
            padding-left: 20px;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #1f2937;
            }

            .nav {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .main {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">CareerCompass</div>

            <nav class="nav">
                <a href="#" class="active">Profile</a>
                <a href="#">Dashboard</a>
                <a href="#">Recommendations</a>
                <a href="#">Events</a>
                <a href="#">Internships</a>
                <a href="#">Projects</a>
                <a href="#">Chat Mentor</a>
            </nav>
        </aside>

        <main class="main">
            <div class="topbar">
                <h1>My Student Profile</h1>
                <p>Update your academic background, goals, skills, and interests.</p>
            </div>

            <div class="content-card">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit">Save Profile</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
